##### Terminal & Colors (important for AstroNvim themes)
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

##### Faster escape handling (fixes Vim lag)
set -sg escape-time 0

##### Enable mouse support
set -g mouse on

##### Use Ctrl-a instead of Ctrl-b (optional but popular)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

##### Better splits using vim keys
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

##### Reload config quickly
bind r source-file ~/.tmux.conf \; display "tmux reloaded"

##### Vim-style pane navigation (prefix + hjkl)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

##### Resize panes with prefix + Shift + hjkl
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

##### Start window numbering at 1
set -g base-index 1
setw -g pane-base-index 1

##### Automatically renumber windows
set -g renumber-windows on

##### Copy mode uses vim keys
setw -g mode-keys vi

##### Better copy-mode selection
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel

##### Clipboard integration (Linux/macOS)
# macOS:
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# Linux (xclip):
# bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard -i"

##### Status bar minimal (AstroNvim users usually prefer minimal tmux UI)
set -g status-bg black
set -g status-fg white
set -g status-left ""
set -g status-right "#H"

##### True color passthrough for Neovim
set -as terminal-features ",xterm-256color:RGB"
